apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-app
  namespace: booking-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-app
  template:
    metadata:
      labels:
        app: booking-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: booking-app
          image: 051602877369.dkr.ecr.ap-northeast-1.amazonaws.com/booking-app:0b2fb09ab65c44b937ecfad5873b43704964d74d
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-db-secret
                  key: connection_string
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: booking-app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: booking-app-config
                  key: REDIS_PORT
          volumeMounts:
            - name: receipts
              mountPath: /data/receipts
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: receipts
          persistentVolumeClaim:
            claimName: receipts-pvc
        - name: tmp
          emptyDir: {}
