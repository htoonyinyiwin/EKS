apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-app
  namespace: booking-app
spec:
  replicas: 1
  strategy:
    type: Recreate  # RWO PVC can only be mounted by one pod; Recreate kills old pod before starting new one
  selector:
    matchLabels:
      app: booking-app
  template:
    metadata:
      labels:
        app: booking-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: booking-app
          image: 051602877369.dkr.ecr.ap-northeast-1.amazonaws.com/booking-app:c46e7c6d19ca119b6a26f58241e47505fa6654ca
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-db-secret
                  key: connection_string
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: booking-app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: booking-app-config
                  key: REDIS_PORT
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: receipts
              mountPath: /data/receipts
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: receipts
          persistentVolumeClaim:
            claimName: receipts-pvc
        - name: tmp
          emptyDir: {}
