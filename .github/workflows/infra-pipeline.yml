name: Infra Pipeline
run-name: "Infra Pipeline - ${{ github.event.head_commit.message || github.event.pull_request.title || 'Manual' }}"

on:
  push:
    branches: [main]
    paths:
      - "main-infra/**"
      - "main-platform/**"
      - "modules/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "main-infra/**"
      - "main-platform/**"
      - "modules/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      run_vpc:
        description: 'Run VPC track (main-infra) — dev then uat'
        type: boolean
        default: false
      run_scan:
        description: 'Run Checkov security scan'
        type: boolean
        default: false
      run_destroy:
        description: 'Destroy main-platform EKS'
        type: boolean
        default: false
      destroy_env:
        description: 'Target environment to destroy'
        type: choice
        options: [dev, uat]
        default: dev

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "v0.53.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Validate main-infra
        working-directory: main-infra
        run: terraform init -backend=false && terraform validate

      - name: Validate main-platform
        working-directory: main-platform
        run: terraform init -backend=false && terraform validate

      - name: TFLint Init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TFLint main-infra
        working-directory: main-infra
        run: tflint --call-module-type=all

      - name: TFLint main-platform
        working-directory: main-platform
        run: tflint --call-module-type=all

      - name: Checkov Security Scan
        if: ${{ inputs.run_scan == true }}
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          soft_fail: true
          output_format: cli
          skip_path: "cloudflare"

  # ─── VPC TRACK ────────────────────────────────────────────────────────────

  plan-infra-dev:
    name: Plan - main-infra (dev)
    needs: ci
    if: ${{ inputs.run_vpc == true }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main-infra
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_DEV }}:role/github-oidc-eks-ecr-role-dev
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.dev.hcl

      - name: Terraform Plan
        run: terraform plan -var-file=variables.dev.tfvars -out=dev.plan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-infra-dev
          path: main-infra/dev.plan

  apply-infra-dev:
    name: Apply - main-infra (dev)
    needs: plan-infra-dev
    if: ${{ inputs.run_vpc == true }}
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: main-infra
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_DEV }}:role/github-oidc-eks-ecr-role-dev
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.dev.hcl

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-infra-dev
          path: main-infra

      - name: Terraform Apply
        run: terraform apply dev.plan

  plan-infra-uat:
    name: Plan - main-infra (uat)
    needs: apply-infra-dev
    if: ${{ inputs.run_vpc == true }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main-infra
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_UAT }}:role/github-oidc-eks-ecr-role-uat
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.uat.hcl

      - name: Terraform Plan
        run: terraform plan -var-file=variables.uat.tfvars -out=dev.plan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-infra-uat
          path: main-infra/dev.plan

  apply-infra-uat:
    name: Apply - main-infra (uat)
    needs: plan-infra-uat
    if: ${{ inputs.run_vpc == true }}
    runs-on: ubuntu-latest
    environment: uat
    defaults:
      run:
        working-directory: main-infra
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_UAT }}:role/github-oidc-eks-ecr-role-uat
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.uat.hcl

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-infra-uat
          path: main-infra

      - name: Terraform Apply
        run: terraform apply dev.plan

  # ─── PLATFORM TRACK ───────────────────────────────────────────────────────

  plan-platform-dev:
    name: Plan - main-platform (dev)
    needs: [ci, apply-infra-dev]
    # skipped when run_destroy=true
    if: always() && inputs.run_destroy != true && needs.ci.result == 'success' && (needs.apply-infra-dev.result == 'success' || needs.apply-infra-dev.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main-platform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_DEV }}:role/github-oidc-eks-ecr-role-dev
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.dev.hcl

      - name: Terraform Plan
        run: terraform plan -var-file=variables.dev.tfvars -out=dev.plan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-platform-dev
          path: main-platform/dev.plan

  apply-platform-dev:
    name: Apply - main-platform (dev)
    needs: plan-platform-dev
    if: always() && inputs.run_destroy != true && needs.plan-platform-dev.result == 'success'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: main-platform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_DEV }}:role/github-oidc-eks-ecr-role-dev
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.dev.hcl

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-platform-dev
          path: main-platform

      - name: Terraform Apply
        run: terraform apply dev.plan

  plan-platform-uat:
    name: Plan - main-platform (uat)
    needs: apply-platform-dev
    if: always() && inputs.run_destroy != true && needs.apply-platform-dev.result == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main-platform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_UAT }}:role/github-oidc-eks-ecr-role-uat
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.uat.hcl

      - name: Terraform Plan
        run: terraform plan -var-file=variables.uat.tfvars -out=dev.plan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-platform-uat
          path: main-platform/dev.plan

  apply-platform-uat:
    name: Apply - main-platform (uat)
    needs: plan-platform-uat
    if: always() && inputs.run_destroy != true && needs.plan-platform-uat.result == 'success'
    runs-on: ubuntu-latest
    environment: uat
    defaults:
      run:
        working-directory: main-platform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_UAT }}:role/github-oidc-eks-ecr-role-uat
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.uat.hcl

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-platform-uat
          path: main-platform

      - name: Terraform Apply
        run: terraform apply dev.plan

  # ─── DESTROY ──────────────────────────────────────────────────────────────

  destroy-platform:
    name: Destroy - main-platform (${{ inputs.destroy_env }})
    needs: ci
    if: always() && inputs.run_destroy == true && needs.ci.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.destroy_env }}
    defaults:
      run:
        working-directory: main-platform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ inputs.destroy_env == 'uat' && secrets.AWS_ACCOUNT_ID_UAT || secrets.AWS_ACCOUNT_ID_DEV }}:role/github-oidc-eks-ecr-role-${{ inputs.destroy_env }}
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.${{ inputs.destroy_env }}.hcl

      - name: Terraform Destroy
        run: terraform destroy -var-file=variables.${{ inputs.destroy_env }}.tfvars -auto-approve
