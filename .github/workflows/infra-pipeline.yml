name: Infra Pipeline

on:
  push:
    branches: [main]
    paths:
      - "main-infra/**"
      - "main-platform/**"
      - "modules/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "main-infra/**"
      - "main-platform/**"
      - "modules/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      run_vpc:
        description: 'Run main-infra (VPC) jobs — only needed when VPC changes'
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  plan-infra:
    name: Plan - main-infra (VPC)
    if: ${{ inputs.run_vpc == true }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main-infra
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-oidc-eks-ecr-role-dev
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.dev.hcl

      - name: Terraform Plan
        run: terraform plan -var-file=variables.dev.tfvars -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-infra
          path: main-infra/tfplan

  apply-infra:
    name: Apply - main-infra (VPC)
    needs: plan-infra
    if: ${{ inputs.run_vpc == true }}
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: main-infra
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-oidc-eks-ecr-role-dev
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.dev.hcl

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-infra
          path: main-infra

      - name: Terraform Apply
        run: terraform apply tfplan

  plan-platform:
    name: Plan - main-platform (EKS)
    needs: apply-infra
    if: always() && (needs.apply-infra.result == 'success' || needs.apply-infra.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: main-platform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-oidc-eks-ecr-role-dev
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.dev.hcl

      - name: Terraform Plan
        run: terraform plan -var-file=variables.dev.tfvars -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-platform
          path: main-platform/tfplan

  apply-platform:
    name: Apply - main-platform (EKS)
    needs: plan-platform
    if: always() && needs.plan-platform.result == 'success'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: main-platform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-oidc-eks-ecr-role-dev
          aws-region: ap-northeast-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform Init
        run: terraform init -backend-config=aws-tfstate.dev.hcl

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-platform
          path: main-platform

      - name: Terraform Apply
        run: terraform apply tfplan
