name: Mirror Images to ECR
run-name: "Mirror Images (${{ github.event.inputs.target_env }}) - ${{ github.event.inputs.reason || 'manual' }}"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment to mirror images into'
        type: choice
        options: [dev, uat]
        default: uat
      reason:
        description: 'Reason for mirroring (e.g. argocd upgrade)'
        type: string
        default: 'initial setup'

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  mirror:
    name: Mirror to ECR (${{ github.event.inputs.target_env }})
    runs-on: ubuntu-latest
    env:
      TARGET_ENV: ${{ github.event.inputs.target_env }}
      ACCOUNT_ID: ${{ github.event.inputs.target_env == 'uat' && secrets.AWS_ACCOUNT_ID_UAT || secrets.AWS_ACCOUNT_ID_DEV }}
      ECR: ${{ github.event.inputs.target_env == 'uat' && secrets.AWS_ACCOUNT_ID_UAT || secrets.AWS_ACCOUNT_ID_DEV }}.dkr.ecr.ap-northeast-1.amazonaws.com
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/github-oidc-eks-ecr-role-${{ env.TARGET_ENV }}
          aws-region: ap-northeast-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-northeast-1 | \
            docker login --username AWS --password-stdin $ECR

      - name: Pull argocd
        run: docker pull quay.io/argoproj/argocd:v2.14.10

      - name: Scan argocd
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: quay.io/argoproj/argocd:v2.14.10
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Push argocd
        run: |
          docker tag  quay.io/argoproj/argocd:v2.14.10 $ECR/argocd:v2.14.10
          docker push $ECR/argocd:v2.14.10

      - name: Pull dex
        run: docker pull ghcr.io/dexidp/dex:v2.42.1

      - name: Scan dex
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/dexidp/dex:v2.42.1
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Push dex
        run: |
          docker tag  ghcr.io/dexidp/dex:v2.42.1 $ECR/dex:v2.42.1
          docker push $ECR/dex:v2.42.1

      - name: Pull redis
        run: docker pull public.ecr.aws/docker/library/redis:7.4.2-alpine

      - name: Scan redis
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: public.ecr.aws/docker/library/redis:7.4.2-alpine
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Push redis
        run: |
          docker tag  public.ecr.aws/docker/library/redis:7.4.2-alpine $ECR/redis:7.4.2-alpine
          docker push $ECR/redis:7.4.2-alpine

      - name: Pull aws-load-balancer-controller
        run: docker pull public.ecr.aws/eks/aws-load-balancer-controller:v2.13.0

      - name: Scan aws-load-balancer-controller
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: public.ecr.aws/eks/aws-load-balancer-controller:v2.13.0
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Push aws-load-balancer-controller
        run: |
          docker tag  public.ecr.aws/eks/aws-load-balancer-controller:v2.13.0 $ECR/aws-load-balancer-controller:v2.13.0
          docker push $ECR/aws-load-balancer-controller:v2.13.0
