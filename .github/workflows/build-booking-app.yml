name: Build Booking App

on:
  push:
    branches: [main]
    paths:
      - "booking-app/app/**"
      - "booking-app/Dockerfile"

permissions:
  id-token: write
  contents: write

jobs:
  build:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_UAT }}:role/github-oidc-eks-ecr-role-uat
          aws-region: ap-northeast-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/booking-app:$IMAGE_TAG -t $REGISTRY/booking-app:latest ./booking-app
          docker push $REGISTRY/booking-app:$IMAGE_TAG
          docker push $REGISTRY/booking-app:latest

      - name: Update image tag in deployment.yaml
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|image: .*booking-app:.*|image: $REGISTRY/booking-app:$IMAGE_TAG|" booking-app/k8s/deployment.yaml
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add booking-app/k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update booking-app image to $IMAGE_TAG [skip ci]"
          git push
